spring.application.name=agentGeneric


spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2:latest
spring.ai.ollama.connection-timeout=10m
spring.ai.ollama.read-timeout=10m
spring.ai.ollama.chat.options.keep_alive=5m


spring.datasource.url=jdbc:mysql://localhost:3306/company_db
spring.datasource.username=user
spring.datasource.password=pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
