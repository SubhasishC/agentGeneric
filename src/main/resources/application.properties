spring.application.name=agentGeneric

# ---------------------------
# Spring AI (Ollama)
# ---------------------------
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2:latest
spring.ai.ollama.connection-timeout=10m
spring.ai.ollama.read-timeout=10m
spring.ai.ollama.chat.options.keep_alive=5m

# ---------------------------
# R2DBC (Reactive MySQL)
# ---------------------------
spring.r2dbc.url=r2dbc:mysql://localhost:3306/company_db
spring.r2dbc.username=user
spring.r2dbc.password=pass

# Optional: connection pool (recommended)
spring.r2dbc.pool.enabled=true
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=20

# ---------------------------
# Logging (instead of JPA SQL logs)
# ---------------------------
logging.level.org.springframework.r2dbc=DEBUG
logging.level.io.r2dbc.spi=DEBUG

# ---------------------------
# WebFlux timeout (replaces MVC async timeout)
# ---------------------------
spring.webflux.session.timeout=240s