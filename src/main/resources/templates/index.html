<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Simple Spring UI</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        input {
            width: 300px;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
            margin-left: 10px;
        }

        .response {
            margin-top: 20px;
            color: green;
            font-size: 18px;
        }
    </style>
</head>

<body>

<h2>Spring WebFlux UI</h2>

<form action="/ask" method="post">

    <input
            type="text"
            name="message"
            placeholder="Enter message"/>

    <button type="submit">
        Send
    </button>
</form>

<div
        class="response"
        th:if="${response != null}"
        th:text="${response}">
</div>

</body>

</html>
